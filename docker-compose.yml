services:

  postgres:
    image: postgres:16-alpine
    container_name: competency-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: competency_matrix
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: competency-api
    environment:
      ASPNETCORE_URLS: "http://+:5000"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=competency_matrix;Username=postgres;Password=postgres"
      Jwt__Secret: "CHANGE_ME_TO_A_VERY_LONG_SECRET_KEY_AT_LEAST_32_CHARS"
      Jwt__Issuer: "CompetencyMatrix"
      Jwt__Audience: "CompetencyMatrix"
      Jwt__ExpiryMinutes: "480"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: competency-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
